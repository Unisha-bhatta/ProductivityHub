<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProductivityHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ───────────── AUTH SCREEN ───────────── -->
  <div id="auth-screen" class="screen active">

    <div class="auth-bg">
      <div class="auth-orb orb-1"></div>
      <div class="auth-orb orb-2"></div>
      <div class="auth-orb orb-3"></div>
    </div>

    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">ProductivityHub</span>
      </div>

      <!-- Tab Toggle -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Sign In</button>
        <button class="auth-tab" id="tab-signup">Sign Up</button>
      </div>

      <!-- ── Sign In Form ── -->
      <form id="login-form" class="auth-form" novalidate>

        <div class="field-group">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            placeholder="you@email.com"
            autocomplete="email"
          >
          <small class="field-error" id="login-email-error"></small>
        </div>

        <div class="field-group">
          <label for="login-password">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="login-password"
              placeholder="Enter your password"
              autocomplete="current-password"
            >
            <button type="button" class="pw-toggle" aria-label="Show password">
              <!-- Eye icon -->
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <small class="field-error" id="login-password-error"></small>
        </div>

        <button type="submit" class="btn-primary">
          <span class="btn-label">Sign In</span>
        </button>

        <p class="auth-hint">Demo: any valid email + password (6+ chars)</p>

      </form>

      <!-- ── Sign Up Form ── -->
      <form id="signup-form" class="auth-form hidden" novalidate>

        <div class="field-group">
          <label for="signup-name">Full Name</label>
          <input
            type="text"
            id="signup-name"
            placeholder="Your full name"
            autocomplete="name"
          >
          <small class="field-error" id="signup-name-error"></small>
        </div>

        <div class="field-group">
          <label for="signup-email">Email</label>
          <input
            type="email"
            id="signup-email"
            placeholder="you@email.com"
            autocomplete="email"
          >
          <small class="field-error" id="signup-email-error"></small>
        </div>

        <div class="field-group">
          <label for="signup-password">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="signup-password"
              placeholder="Min 6 characters"
              autocomplete="new-password"
            >
            <button type="button" class="pw-toggle" aria-label="Show password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <!-- Password strength bar -->
          <div class="pw-strength">
            <div class="pw-bar" id="pw-bar"></div>
          </div>
          <small class="pw-hint" id="pw-hint"></small>
          <small class="field-error" id="signup-password-error"></small>
        </div>

        <div class="field-group">
          <label for="signup-confirm">Confirm Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="signup-confirm"
              placeholder="Repeat your password"
              autocomplete="new-password"
            >
            <button type="button" class="pw-toggle" aria-label="Show password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <small class="field-error" id="signup-confirm-error"></small>
        </div>

        <button type="submit" class="btn-primary">
          <span class="btn-label">Create Account</span>
        </button>

      </form>

    </div>
  </div>

  <!-- ───────────── DASHBOARD SCREEN ───────────── -->
  <div id="dashboard-screen" class="screen">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">ProductivityHub</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span>Overview</span>
        </button>
        <button class="nav-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span>Tasks</span>
        </button>
        <button class="nav-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <span>Weather</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="user-avatar" id="user-avatar">U</div>
          <span class="user-name" id="user-name-display">User</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <p class="coming-soon">Dashboard coming in Phase 3 onwards</p>
    </main>

  </div>

</body>
</html>
